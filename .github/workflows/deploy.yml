- name: Deploy to EC2
  uses: appleboy/ssh-action@master
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ec2-user  # Updated for Amazon Linux
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      # Navigate to app directory
      cd ~/item-catalog
      
      # If repo doesn't exist, clone it; else pull
      if [ ! -d ".git" ]; then
        git clone https://github.com/${{ github.repository }}.git .
      else
        git pull origin main
      fi
      
      # Kill existing Flask process on port 8080 (if any)
      # Amazon Linux uses 'ss' or 'lsof' (you might need to install lsof)
      sudo lsof -t -i:8080 | xargs -r kill -9
      
      # Start the app in the background
      nohup python3 app.py > log.txt 2>&1 &